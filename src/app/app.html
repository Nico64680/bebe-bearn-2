<div class="container" [class.time-passed]="isTimePassed()">
  @if (isTimePassed()) {
    <p class="sexe-desc animation">Je dis que c'est un</p>
    <p class="sexe animation">Garçon</p>
  }
  @else {
    <p class="desc">Mon prognostique dans</p>
    <p class="timer">{{ remainingHoursSeconde() }}</p>
  }

</div>

@if (!isTimePassed()) {
  <img class="nuage animation" src="img/nuage.svg" >
  <img class="nouveau-nee animation" src="img/nouveau-nee.png" >
}
